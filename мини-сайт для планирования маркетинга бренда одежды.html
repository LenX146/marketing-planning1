<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>S.L.E.N.G. · Планирование</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f0ede8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px;
            background-image: radial-gradient(ellipse at 20% 30%, #e8e4de 0%, #d5d0c8 100%);
        }

        .app {
            max-width: 1440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 36px 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06), 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .brand h1 {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.5px;
            color: #1a1a1a;
            background: linear-gradient(135deg, #1a1a1a 0%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .sub {
            font-weight: 400;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-actions .date-badge {
            background: rgba(0, 0, 0, 0.04);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 450;
            color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .btn-icon {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 15px;
            color: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #1a1a1a;
            border-color: rgba(0, 0, 0, 0.1);
        }

        .btn-primary-sm {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary-sm:hover {
            background: #333;
        }

        /* ЦЕЛИ МЕСЯЦА */
        .goals-section {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 18px 22px 22px;
            margin-bottom: 28px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .goals-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .goals-header .goals-label {
            font-weight: 500;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .goals-header .goals-label i {
            color: rgba(0, 0, 0, 0.2);
        }

        .goals-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .goal-item {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            padding: 12px 16px;
            border-left: 4px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .goal-item:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .goal-item .goal-content {
            flex: 1;
            min-width: 0;
        }

        .goal-item .goal-content .goal-text {
            font-size: 15px;
            line-height: 1.6;
            color: #1a1a1a;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .goal-item .goal-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .goal-item .goal-actions button {
            background: none;
            border: none;
            color: rgba(0, 0, 0, 0.15);
            cursor: pointer;
            font-size: 13px;
            transition: color 0.2s;
            padding: 4px;
        }

        .goal-item .goal-actions button:hover {
            color: rgba(0, 0, 0, 0.4);
        }

        .goal-item .goal-actions .delete-goal:hover {
            color: #c0392b;
        }

        .empty-goals {
            color: rgba(0, 0, 0, 0.15);
            font-style: italic;
            padding: 6px 0;
            font-size: 14px;
        }

        /* МОДАЛЬНОЕ ОКНО РЕДАКТОРА ЦЕЛИ (ПРОСТОЙ ТЕКСТ) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 36px 36px;
            max-width: 640px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .modal-header .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: color 0.2s;
            padding: 0 8px;
        }

        .modal-header .close-modal:hover {
            color: #1a1a1a;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-body .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.4);
            display: block;
            margin-bottom: 4px;
        }

        .modal-body .form-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 14px 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 16px;
            outline: none;
            resize: vertical;
            color: #1a1a1a;
            background: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            transition: border 0.2s;
        }

        .modal-body .form-group textarea:focus {
            border-color: rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.7);
        }

        .modal-body .form-group textarea::placeholder {
            color: rgba(0, 0, 0, 0.15);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        .modal-footer .btn-primary {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .modal-footer .btn-primary:hover {
            background: #333;
        }

        .modal-footer .btn-secondary {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.3);
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 450;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .modal-footer .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.02);
        }

        /* ---- ОСТАЛЬНЫЕ СТИЛИ (календарь, задачи, проекты, архив) ---- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 32px;
            margin-bottom: 28px;
        }

        @media (max-width: 960px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .app { padding: 20px; }
            .modal { padding: 24px; }
        }

        .calendar-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header .month-label {
            font-weight: 600;
            font-size: 20px;
            color: #1a1a1a;
        }

        .calendar-header .month-label span {
            font-weight: 400;
            color: rgba(0, 0, 0, 0.25);
        }

        .nav-group {
            display: flex;
            gap: 6px;
        }

        .nav-group button {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-group button:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #1a1a1a;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 450;
            background: transparent;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
            position: relative;
        }

        .day-cell:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .day-cell.other-month {
            color: rgba(0, 0, 0, 0.15);
        }

        .day-cell.today {
            background: #1a1a1a;
            color: #ffffff;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .day-cell.selected {
            border: 2px solid #1a1a1a;
            background: rgba(0, 0, 0, 0.03);
            font-weight: 550;
        }

        .day-cell.has-task::after {
            content: '';
            position: absolute;
            bottom: 5px;
            width: 5px;
            height: 5px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
        }

        .day-cell.today.has-task::after {
            background: rgba(255, 255, 255, 0.5);
        }

        .day-cell.selected.has-task::after {
            background: rgba(0, 0, 0, 0.4);
        }

        .day-cell.future {
            opacity: 0.9;
        }

        .day-cell.past {
            opacity: 0.5;
        }

        .tasks-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .panel-header .date-title {
            font-weight: 600;
            font-size: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header .date-title i {
            color: rgba(0, 0, 0, 0.2);
            font-size: 18px;
        }

        .panel-header .day-tag {
            background: rgba(0, 0, 0, 0.04);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 450;
            color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .panel-header .day-tag.future-tag {
            background: rgba(30, 100, 60, 0.06);
            color: rgba(30, 80, 50, 0.6);
            border-color: rgba(30, 100, 60, 0.08);
        }

        .task-list-section {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            max-height: 160px;
            overflow-y: auto;
        }

        .task-list-section .task-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-list-section .task-list-header span {
            font-size: 13px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .task-list-section .task-list-header .task-count {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.2);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            transition: background 0.15s;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .task-item .task-check {
            width: 18px;
            height: 18px;
            border-radius: 30px;
            border: 1.5px solid rgba(0, 0, 0, 0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.3);
        }

        .task-item .task-check:hover {
            border-color: rgba(0, 0, 0, 0.3);
        }

        .task-item .task-check.done {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: #fff;
        }

        .task-item .task-check.done i {
            font-size: 10px;
            color: #fff;
        }

        .task-item .task-text {
            flex: 1;
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 400;
            word-break: break-word;
        }

        .task-item .task-text.done-text {
            text-decoration: line-through;
            color: rgba(0, 0, 0, 0.25);
        }

        .task-item .task-delete {
            background: none;
            border: none;
            color: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 13px;
            transition: color 0.2s;
            padding: 0 4px;
        }

        .task-item .task-delete:hover {
            color: rgba(0, 0, 0, 0.3);
        }

        .empty-tasks {
            color: rgba(0, 0, 0, 0.15);
            font-size: 14px;
            padding: 8px 0 4px;
            font-style: italic;
            text-align: center;
        }

        .add-task-row {
            display: flex;
            gap: 8px;
        }

        .add-task-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
        }

        .add-task-row input:focus {
            border-color: rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.7);
        }

        .add-task-row input::placeholder {
            color: rgba(0, 0, 0, 0.15);
        }

        .add-task-row button {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .add-task-row button:hover {
            background: #333;
        }

        .task-actions-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }

        .task-actions-row .status {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.2);
        }

        .btn-outline-sm {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 450;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-outline-sm:hover {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
            color: #1a1a1a;
        }

        .projects-section {
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 16px;
            margin-top: 2px;
        }

        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .projects-header h3 {
            font-weight: 500;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 100px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .project-item {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            padding: 8px 14px;
            border-left: 3px solid rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.7);
        }

        .project-item .p-name {
            font-weight: 450;
        }

        .project-item .p-meta {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .project-item .p-meta .status-badge {
            background: rgba(0, 0, 0, 0.03);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.25);
        }

        .project-item .del-proj {
            background: none;
            border: none;
            color: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: color 0.2s;
        }

        .project-item .del-proj:hover {
            color: rgba(0, 0, 0, 0.3);
        }

        .add-project {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .add-project input {
            flex: 1;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
        }

        .add-project input:focus {
            border-color: rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.6);
        }

        .add-project input::placeholder {
            color: rgba(0, 0, 0, 0.12);
        }

        .add-project button {
            background: rgba(0, 0, 0, 0.04);
            color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .add-project button:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #1a1a1a;
        }

        .archive-section {
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 16px;
            margin-top: 2px;
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .archive-header h3 {
            font-weight: 500;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .archive-list {
            max-height: 80px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .archive-item {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 6px 14px;
            margin-bottom: 4px;
            border-left: 3px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.5);
        }

        .archive-item .note {
            flex: 1;
        }

        .archive-item .note-date {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.15);
            white-space: nowrap;
        }

        .archive-item .del-btn {
            background: none;
            border: none;
            color: rgba(0, 0, 0, 0.08);

        .archive-item .del-btn:hover {

        .empty-archive {
            color: rgba(0, 0, 0, 0.12);
            font-size: 13px;
            padding: 4px 0 2px;
            font-style: italic;
        }

        .task-list-section::-webkit-scrollbar,
        .project-list::-webkit-scrollbar,
        .archive-list::-webkit-scrollbar {
            width: 3px;
        }
        .task-list-section::-webkit-scrollbar-thumb,
        .project-list::-webkit-scrollbar-thumb,
        .archive-list::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 10px;
        }
        .modal::-webkit-scrollbar {
            width: 4px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 10px;
        }

        .stats-footer {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            color: rgba(0, 0, 0, 0.2);
            font-size: 13px;
        }

        .stats-footer .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-footer .stat-item i {
            color: rgba(0, 0, 0, 0.08);
        }

        .stats-footer .stat-item strong {
            color: rgba(0, 0, 0, 0.5);
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .app { padding: 16px; border-radius: 32px; }
            .brand h1 { font-size: 22px; }
            .header-actions .date-badge { display: none; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- HEADER -->
    <header class="header">
        <div class="brand">
            <h1>S.L.E.N.G.</h1>
            <span class="sub">планирование</span>
        </div>
        <div class="header-actions">
            <span class="date-badge" id="todayBadge"><i class="far fa-calendar-alt"></i> 24 июня 2026</span>
            <button class="btn-icon" id="resetBtn" title="Сбросить пример"><i class="fas fa-undo-alt"></i></button>
            <button class="btn-icon" id="clearAllBtn" title="Очистить всё"><i class="fas fa-trash-alt"></i></button>
        </div>
    </header>

    <!-- ЦЕЛИ МЕСЯЦА -->
    <div class="goals-section">
        <div class="goals-header">
            <div class="goals-label">
                <i class="fas fa-flag"></i> Цели месяца
                <span style="font-weight:400; text-transform:none; font-size:12px; color:rgba(0,0,0,0.15);" id="goalsCount">0</span>
            </div>
            <button class="btn-primary-sm" id="addGoalBtn"><i class="fas fa-plus"></i> Добавить цель</button>
        </div>
        <div class="goals-list" id="goalsList">
            <div class="empty-goals">Нет целей. Добавьте первую!</div>
        </div>
    </div>

    <!-- GRID -->
    <div class="dashboard-grid">
        <!-- CALENDAR -->
        <div class="calendar-card">
            <div class="calendar-header">
                <div class="month-label" id="monthLabel">Июнь <span>2026</span></div>
                <div class="nav-group">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div class="days-grid" id="daysGrid"></div>
        </div>

        <!-- TASKS PANEL -->
        <div class="tasks-panel">
            <div class="panel-header">
                <div class="date-title">
                    <i class="fas fa-calendar-check"></i>
                    <span id="selectedDateDisplay">24 июня 2026</span>
                </div>
                <span class="day-tag" id="dayTag">сегодня</span>
            </div>

            <div class="task-list-section" id="taskListSection">
                <div class="task-list-header">
                    <span>Задачи на день</span>
                    <span class="task-count" id="taskCount">0</span>
                </div>
                <div id="taskList">
                    <div class="empty-tasks">Нет задач</div>
                </div>
            </div>

            <div class="add-task-row">
                <input type="text" id="newTaskInput" placeholder="Новая задача..." />
                <button id="addTaskBtn"><i class="fas fa-plus"></i> Добавить</button>
            </div>

            <div class="task-actions-row">
                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                    <button class="btn-outline-sm" id="archiveAllTasksBtn"><i class="fas fa-archive"></i> Архив всех</button>
                    <button class="btn-outline-sm" id="clearTasksBtn"><i class="fas fa-trash-alt"></i> Очистить</button>
                </div>
                <span class="status" id="taskStatus">сохранено</span>
            </div>

            <!-- PROJECTS -->
            <div class="projects-section">
                <div class="projects-header">
                    <h3><i class="fas fa-folder-open"></i> Проекты</h3>
                    <span style="font-size:12px; color:rgba(0,0,0,0.15);" id="projectCount">0</span>
                </div>
                <div class="project-list" id="projectList">
                    <div class="empty-archive">Нет проектов</div>
                </div>
                <div class="add-project">
                    <input type="text" id="projectInput" placeholder="Новый проект..." />
                    <button id="addProjectBtn"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <!-- ARCHIVE -->
            <div class="archive-section">
                <div class="archive-header">
                    <h3><i class="fas fa-box-archive"></i> Архив</h3>
                    <button class="btn-icon" id="clearArchiveBtn" style="width:28px;height:28px;font-size:12px;" title="Очистить архив"><i class="fas fa-trash-alt"></i></button>
                </div>
                <div class="archive-list" id="archiveList">
                    <div class="empty-archive">Нет записей</div>
                </div>
            </div>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-footer">
        <div class="stat-item"><i class="fas fa-tasks"></i> Задач: <strong id="totalTasks">0</strong></div>
        <div class="stat-item"><i class="fas fa-folder"></i> Проектов: <strong id="totalProjects">0</strong></div>
        <div class="stat-item"><i class="fas fa-archive"></i> В архиве: <strong id="totalArchived">0</strong></div>
        <div class="stat-item"><i class="fas fa-calendar-day"></i> Дней с планами: <strong id="daysWithTasks">0</strong></div>
        <div class="stat-item"><i class="fas fa-clock"></i> Будущих дней: <strong id="futureDays">0</strong></div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО РЕДАКТОРА ЦЕЛИ (ПРОСТОЙ ТЕКСТ) -->
    <div class="modal-overlay" id="goalModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Новая цель</h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Текст цели</label>
                    <textarea id="goalTextInput" placeholder="Введите текст цели..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelGoalBtn">Отмена</button>
                <button class="btn-primary" id="saveGoalBtn"><i class="fas fa-check"></i> Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ===========================================
        //   STATE
        // ===========================================
        let currentDate = new Date();
        let selectedDate = new Date();
        let selectedKey = formatDateKey(selectedDate);

        let tasks = {};
        let projects = [];
        let archive = [];
        let goals = []; // [{ id, text }]
        let taskIdCounter = 1000;
        let projectIdCounter = 100;
        let goalIdCounter = 100;

        let editingGoalId = null;

        // ===========================================
        //   DOM
        // ===========================================
        const daysGrid = document.getElementById('daysGrid');
        const monthLabel = document.getElementById('monthLabel');
        const selectedDateDisplay = document.getElementById('selectedDateDisplay');
        const dayTag = document.getElementById('dayTag');
        const taskList = document.getElementById('taskList');
        const taskCount = document.getElementById('taskCount');
        const newTaskInput = document.getElementById('newTaskInput');
        const taskStatus = document.getElementById('taskStatus');
        const archiveList = document.getElementById('archiveList');
        const projectList = document.getElementById('projectList');
        const projectInput = document.getElementById('projectInput');
        const projectCount = document.getElementById('projectCount');
        const todayBadge = document.getElementById('todayBadge');
        const goalsList = document.getElementById('goalsList');
        const goalsCount = document.getElementById('goalsCount');

        const addTaskBtn = document.getElementById('addTaskBtn');
        const clearTasksBtn = document.getElementById('clearTasksBtn');
        const archiveAllTasksBtn = document.getElementById('archiveAllTasksBtn');
        const resetBtn = document.getElementById('resetBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const clearArchiveBtn = document.getElementById('clearArchiveBtn');
        const addProjectBtn = document.getElementById('addProjectBtn');
        const prevMonth = document.getElementById('prevMonth');
        const nextMonth = document.getElementById('nextMonth');

        const addGoalBtn = document.getElementById('addGoalBtn');
        const goalModal = document.getElementById('goalModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelGoalBtn = document.getElementById('cancelGoalBtn');
        const saveGoalBtn = document.getElementById('saveGoalBtn');
        const goalTextInput = document.getElementById('goalTextInput');
        const modalTitle = document.getElementById('modalTitle');

        const totalTasks = document.getElementById('totalTasks');
        const totalProjects = document.getElementById('totalProjects');
        const totalArchived = document.getElementById('totalArchived');
        const daysWithTasks = document.getElementById('daysWithTasks');
        const futureDays = document.getElementById('futureDays');

        // ===========================================
        //   HELPERS
        // ===========================================
        function formatDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatDateDisplay(date) {
            const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        function isToday(date) {
            const t = new Date();
            return date.getFullYear() === t.getFullYear() &&
                   date.getMonth() === t.getMonth() &&
                   date.getDate() === t.getDate();
        }

        function isFuture(date) {
            const t = new Date();
            t.setHours(0, 0, 0, 0);
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            return d > t;
        }

        function isPast(date) {
            const t = new Date();
            t.setHours(0, 0, 0, 0);
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            return d < t;
        }

        function isSameDay(d1, d2) {
            return d1.getFullYear() === d2.getFullYear() &&
                   d1.getMonth() === d2.getMonth() &&
                   d1.getDate() === d2.getDate();
        }

        function generateTaskId() { return ++taskIdCounter; }
        function generateProjectId() { return ++projectIdCounter; }
        function generateGoalId() { return ++goalIdCounter; }

        function getTasksForDay(key) {
            if (!tasks[key]) tasks[key] = [];
            return tasks[key];
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ===========================================
        //   LOCAL STORAGE
        // ===========================================
        function loadAll() {
            try {
                const savedTasks = localStorage.getItem('sleng_tasks_v2');
                tasks = savedTasks ? JSON.parse(savedTasks) : {};

                const savedProjects = localStorage.getItem('sleng_projects');
                projects = savedProjects ? JSON.parse(savedProjects) : [];

                const savedArchive = localStorage.getItem('sleng_archive');
                archive = savedArchive ? JSON.parse(savedArchive) : [];

                const savedGoals = localStorage.getItem('sleng_goals_v4');
                goals = savedGoals ? JSON.parse(savedGoals) : [];

                if (Object.keys(tasks).length === 0 && projects.length === 0 && archive.length === 0 && goals.length === 0) {
                    loadExample();
                }

                const today = new Date();
                selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                selectedKey = formatDateKey(selectedDate);
                currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
            } catch (e) { console.warn('Load error', e); loadExample(); }
        }

        function loadExample() {
            const today = new Date();
            const t = formatDateKey(today);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dayAfter = new Date(today);
            dayAfter.setDate(dayAfter.getDate() + 2);
            const nextWeek = new Date(today);
            nextWeek.setDate(nextWeek.getDate() + 7);

            tasks = {
                [t]: [
                    { id: generateTaskId(), text: 'Согласовать макеты с дизайнером', done: false },
                    { id: generateTaskId(), text: 'Запустить таргет на новую аудиторию', done: false },
                    { id: generateTaskId(), text: 'Пост в Instagram в 18:00', done: false },
                ],
                [formatDateKey(tomorrow)]: [
                    { id: generateTaskId(), text: 'Съёмка контента для новой коллекции', done: false },
                    { id: generateTaskId(), text: 'Подготовить фото для сторис', done: false },
                ],
                [formatDateKey(dayAfter)]: [
                    { id: generateTaskId(), text: 'Встреча с байерами в 11:00', done: false },
                    { id: generateTaskId(), text: 'Подготовить рассылку для клиентов', done: false },
                ],
                [formatDateKey(nextWeek)]: [
                    { id: generateTaskId(), text: 'Запуск рекламной кампании', done: false },
                ],
            };
            projects = [
                { id: generateProjectId(), name: 'Коллаборация с блогерами', status: 'active' },
                { id: generateProjectId(), name: 'Запуск новой коллекции', status: 'active' },
            ];
            archive = [
                { text: 'Съёмка лукбука с фотографом', date: '20 июня 2026' },
                { text: 'Запуск E-mail рассылки', date: '18 июня 2026' },
            ];
            goals = [
                { id: generateGoalId(), text: 'Укрепить позиции бренда на рынке' },
                { id: generateGoalId(), text: 'Запустить новую коллекцию к концу месяца' },
                { id: generateGoalId(), text: 'Провести анализ конкурентов и скорректировать стратегию' },
            ];
            saveAll();
        }

        function saveAll() {
            localStorage.setItem('sleng_tasks_v2', JSON.stringify(tasks));
            localStorage.setItem('sleng_projects', JSON.stringify(projects));
            localStorage.setItem('sleng_archive', JSON.stringify(archive));
            localStorage.setItem('sleng_goals_v4', JSON.stringify(goals));
        }

        // ===========================================
        //   RENDER CALENDAR
        // ===========================================
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDayOfWeek = firstDay.getDay();
            let startOffset = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;

            const today = new Date();
            let html = '';

            const prevLast = new Date(year, month, 0).getDate();
            for (let i = startOffset - 1; i >= 0; i--) {
                html += `<div class="day-cell other-month">${prevLast - i}</div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const key = formatDateKey(dateObj);
                const isTodayDate = isToday(dateObj);
                const isSelected = isSameDay(dateObj, selectedDate);
                const hasTask = tasks[key] && tasks[key].length > 0;
                const isFutureDate = isFuture(dateObj);
                const isPastDate = isPast(dateObj);

                let classes = 'day-cell';
                if (isTodayDate) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasTask) classes += ' has-task';
                if (isFutureDate) classes += ' future';
                if (isPastDate) classes += ' past';

                html += `<div class="${classes}" data-key="${key}">${d}</div>`;
            }

            const totalCells = startOffset + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let d = 1; d <= remaining; d++) {
                html += `<div class="day-cell other-month">${d}</div>`;
            }

            daysGrid.innerHTML = html;

            const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
            monthLabel.innerHTML = `${monthNames[month]} <span>${year}</span>`;
            todayBadge.innerHTML = `<i class="far fa-calendar-alt"></i> ${formatDateDisplay(new Date())}`;

            document.querySelectorAll('.day-cell:not(.other-month)').forEach(cell => {
                cell.addEventListener('click', function() {
                    const key = this.dataset.key;
                    if (!key) return;
                    const parts = key.split('-').map(Number);
                    const newDate = new Date(parts[0], parts[1]-1, parts[2]);
                    selectedDate = newDate;
                    selectedKey = key;
                    renderCalendar();
                    updateDetailPanel();
                    renderTasksForDay();
                });
            });
        }

        // ===========================================
        //   DETAIL PANEL
        // ===========================================
        function updateDetailPanel() {
            selectedDateDisplay.textContent = formatDateDisplay(selectedDate);
            if (isToday(selectedDate)) {
                dayTag.textContent = 'сегодня';
                dayTag.className = 'day-tag';
            } else if (isFuture(selectedDate)) {
                dayTag.textContent = '📅 будущее';
                dayTag.className = 'day-tag future-tag';
            } else {
                dayTag.textContent = 'прошлое';
                dayTag.className = 'day-tag';
            }
            renderTasksForDay();
        }

        // ===========================================
        //   RENDER TASKS FOR DAY
        // ===========================================
        function renderTasksForDay() {
            const key = selectedKey;
            const dayTasks = getTasksForDay(key);
            taskList.innerHTML = '';

            if (!dayTasks || dayTasks.length === 0) {
                taskList.innerHTML = '<div class="empty-tasks">Нет задач</div>';
                taskCount.textContent = '0';
                return;
            }

            dayTasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <div class="task-check ${task.done ? 'done' : ''}" data-id="${task.id}">
                        ${task.done ? '<i class="fas fa-check"></i>' : ''}
                    </div>
                    <span class="task-text ${task.done ? 'done-text' : ''}">${escapeHtml(task.text)}</span>
                    <button class="task-delete" data-id="${task.id}"><i class="fas fa-times"></i></button>
                `;
                taskList.appendChild(div);
            });

            taskCount.textContent = dayTasks.length;

            document.querySelectorAll('.task-check').forEach(el => {
                el.addEventListener('click', function() {
                    const id = Number(this.dataset.id);
                    toggleTaskDone(key, id);
                });
            });

            document.querySelectorAll('.task-delete').forEach(el => {
                el.addEventListener('click', function() {
                    const id = Number(this.dataset.id);
                    deleteTask(key, id);
                });
            });

            updateStats();
        }

        // ===========================================
        //   TASK OPERATIONS
        // ===========================================
        function addTask() {
            const text = newTaskInput.value.trim();
            if (!text) { alert('Введите задачу'); return; }
            const key = selectedKey;
            const dayTasks = getTasksForDay(key);
            dayTasks.push({ id: generateTaskId(), text: text, done: false });
            saveAll();
            renderCalendar();
            renderTasksForDay();
            updateStats();
            newTaskInput.value = '';
            taskStatus.textContent = 'добавлено ✓';
            setTimeout(() => { taskStatus.textContent = 'сохранено'; }, 1000);
        }

        function toggleTaskDone(key, id) {
            const dayTasks = getTasksForDay(key);
            const task = dayTasks.find(t => t.id === id);
            if (task) {
                task.done = !task.done;
                saveAll();
                renderTasksForDay();
                updateStats();
            }
        }

        function deleteTask(key, id) {
            const dayTasks = getTasksForDay(key);
            const idx = dayTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                dayTasks.splice(idx, 1);
                saveAll();
                renderTasksForDay();
                renderCalendar();
                updateStats();
            }
        }

        function clearTasksForDay() {
            const key = selectedKey;
            const dayTasks = getTasksForDay(key);
            if (dayTasks.length === 0) return;
            if (!confirm('Удалить все задачи на этот день?')) return;
            tasks[key] = [];
            saveAll();
            renderTasksForDay();
            renderCalendar();
            updateStats();
        }

        function archiveAllTasksForDay() {
            const key = selectedKey;
            const dayTasks = getTasksForDay(key);
            if (dayTasks.length === 0) { alert('Нет задач для архивирования'); return; }
            const displayDate = formatDateDisplay(selectedDate);
            dayTasks.forEach(task => {
                archive.push({ text: task.text, date: displayDate });
            });
            tasks[key] = [];
            saveAll();
            renderArchive();
            renderTasksForDay();
            renderCalendar();
            updateStats();
            taskStatus.textContent = 'архивировано!';
            setTimeout(() => { taskStatus.textContent = 'сохранено'; }, 1000);
        }

        // ===========================================
        //   GOALS — ПРОСТОЙ ТЕКСТ
        // ===========================================
        function renderGoals() {
            goalsList.innerHTML = '';
            if (!goals || goals.length === 0) {
                goalsList.innerHTML = '<div class="empty-goals">Нет целей. Добавьте первую!</div>';
                goalsCount.textContent = '0';
                return;
            }

            goals.forEach(goal => {
                const div = document.createElement('div');
                div.className = 'goal-item';

                div.innerHTML = `
                    <div class="goal-content">
                        <div class="goal-text">${escapeHtml(goal.text)}</div>
                        <div class="goal-meta" style="font-size:11px; color:rgba(0,0,0,0.1); margin-top:2px;">ID: ${goal.id}</div>
                    </div>
                    <div class="goal-actions">
                        <button class="edit-goal" data-id="${goal.id}" title="Редактировать"><i class="fas fa-pen"></i></button>
                        <button class="delete-goal" data-id="${goal.id}" title="Удалить"><i class="fas fa-times"></i></button>
                    </div>
                `;
                goalsList.appendChild(div);
            });

            goalsCount.textContent = goals.length;

            document.querySelectorAll('.edit-goal').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = Number(this.dataset.id);
                    openGoalEditor(id);
                });
            });

            document.querySelectorAll('.delete-goal').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = Number(this.dataset.id);
                    if (!confirm('Удалить эту цель?')) return;
                    goals = goals.filter(g => g.id !== id);
                    saveAll();
                    renderGoals();
                    updateStats();
                });
            });
        }

        function openGoalEditor(goalId = null) {
            editingGoalId = goalId;
            if (goalId) {
                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;
                modalTitle.textContent = 'Редактировать цель';
                goalTextInput.value = goal.text;
            } else {
                modalTitle.textContent = 'Новая цель';
                goalTextInput.value = '';
            }
            goalModal.classList.add('active');
            setTimeout(() => goalTextInput.focus(), 100);
        }

        function closeGoalEditor() {
            goalModal.classList.remove('active');
            editingGoalId = null;
        }

        function saveGoal() {
            const text = goalTextInput.value.trim();
            if (!text) {
                alert('Введите текст цели');
                return;
            }

            if (editingGoalId) {
                const goal = goals.find(g => g.id === editingGoalId);
                if (goal) {
                    goal.text = text;
                }
            } else {
                goals.push({ id: generateGoalId(), text: text });
            }

            saveAll();
            renderGoals();
            updateStats();
            closeGoalEditor();
        }

        // ===========================================
        //   PROJECTS
        // ===========================================
        function renderProjects() {
            projectList.innerHTML = '';
            if (!projects || projects.length === 0) {
                projectList.innerHTML = '<div class="empty-archive">Нет проектов</div>';
                projectCount.textContent = '0';
                return;
            }
            projects.forEach(p => {
                const div = document.createElement('div');
                div.className = 'project-item';
                div.innerHTML = `
                    <span class="p-name">${escapeHtml(p.name)}</span>
                    <div class="p-meta">
                        <span class="status-badge">${escapeHtml(p.status || 'active')}</span>
                        <button class="del-proj" data-id="${p.id}"><i class="fas fa-times"></i></button>
                    </div>
                `;
                projectList.appendChild(div);
            });
            projectCount.textContent = projects.length;

            document.querySelectorAll('.del-proj').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = Number(this.dataset.id);
                    projects = projects.filter(p => p.id !== id);
                    saveAll();
                    renderProjects();
                    updateStats();
                });
            });
        }

        function addProject() {
            const name = projectInput.value.trim();
            if (!name) { alert('Введите название проекта'); return; }
            projects.push({ id: generateProjectId(), name: name, status: 'active' });
            saveAll();
            renderProjects();
            updateStats();
            projectInput.value = '';
        }

        // ===========================================
        //   ARCHIVE
        // ===========================================
        function renderArchive() {
            archiveList.innerHTML = '';
            if (!archive || archive.length === 0) {
                archiveList.innerHTML = '<div class="empty-archive">Нет записей</div>';
                return;
            }
            const items = [...archive].reverse().slice(0, 12);
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <span class="note">${escapeHtml(item.text)}</span>
                    <span class="note-date">${escapeHtml(item.date)}</span>
                    <button class="del-btn archive-del" data-text="${escapeHtml(item.text)}"><i class="fas fa-times"></i></button>
                `;
                archiveList.appendChild(div);
            });

            document.querySelectorAll('.archive-del').forEach(btn => {
                btn.addEventListener('click', function() {
                    const text = this.getAttribute('data-text');
                    const idx = archive.findIndex(a => a.text === text);
                    if (idx !== -1) {
                        archive.splice(idx, 1);
                        saveAll();
                        renderArchive();
                        updateStats();
                    }
                });
            });
        }

        function clearArchive() {
            if (!confirm('Удалить все записи из архива?')) return;
            archive = [];
            saveAll();
            renderArchive();
            updateStats();
        }

        // ===========================================
        //   STATS
        // ===========================================
        function updateStats() {
            let total = 0;
            let daysWith = 0;
            for (const key in tasks) {
                if (tasks[key] && tasks[key].length > 0) {
                    total += tasks[key].length;
                    daysWith++;
                }
            }
            totalTasks.textContent = total;
            totalProjects.textContent = projects.length;
            totalArchived.textContent = archive.length;
            daysWithTasks.textContent = daysWith;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let futureCount = 0;
            for (const key in tasks) {
                if (!tasks[key] || tasks[key].length === 0) continue;
                const parts = key.split('-').map(Number);
                const d = new Date(parts[0], parts[1]-1, parts[2]);
                d.setHours(0, 0, 0, 0);
                if (d > today) futureCount++;
            }
            futureDays.textContent = futureCount;
        }

        // ===========================================
        //   RESET / CLEAR
        // ===========================================
        function resetExample() {
            if (!confirm('Сбросить все данные к примеру?')) return;
            loadExample();
            const today = new Date();
            selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            selectedKey = formatDateKey(selectedDate);
            currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
            renderAll();
        }

        function clearAll() {
            if (!confirm('Удалить ВСЕ данные?')) return;
            tasks = {};
            projects = [];
            archive = [];
            goals = [];
            saveAll();
            renderAll();
        }

        // ===========================================
        //   NAVIGATION
        // ===========================================
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            if (selectedDate.getFullYear() !== year || selectedDate.getMonth() !== month) {
                let day = selectedDate.getDate();
                const lastDay = new Date(year, month+1, 0).getDate();
                if (day > lastDay) day = lastDay;
                selectedDate = new Date(year, month, day);
                selectedKey = formatDateKey(selectedDate);
            }
            renderAll();
        }

        // ===========================================
        //   RENDER ALL
        // ===========================================
        function renderAll() {
            renderCalendar();
            updateDetailPanel();
            renderTasksForDay();
            renderProjects();
            renderArchive();
            renderGoals();
            updateStats();
        }

        // ===========================================
        //   INIT
        // ===========================================
        function init() {
            const today = new Date();
            currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
            selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            selectedKey = formatDateKey(selectedDate);

            loadAll();
            renderAll();

            // Задачи
            addTaskBtn.addEventListener('click', addTask);
            newTaskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });
            clearTasksBtn.addEventListener('click', clearTasksForDay);
            archiveAllTasksBtn.addEventListener('click', archiveAllTasksForDay);

            // Проекты
            addProjectBtn.addEventListener('click', addProject);
            projectInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addProject(); });

            // Цели
            addGoalBtn.addEventListener('click', () => openGoalEditor(null));
            closeModalBtn.addEventListener('click', closeGoalEditor);
            cancelGoalBtn.addEventListener('click', closeGoalEditor);
            saveGoalBtn.addEventListener('click', saveGoal);
            goalModal.addEventListener('click', function(e) {
                if (e.target === this) closeGoalEditor();
            });

            // Навигация
            resetBtn.addEventListener('click', resetExample);
            clearAllBtn.addEventListener('click', clearAll);
            clearArchiveBtn.addEventListener('click', clearArchive);
            prevMonth.addEventListener('click', () => changeMonth(-1));
            nextMonth.addEventListener('click', () => changeMonth(1));
        }

        init();
    })();
</script>

</body>
</html>
